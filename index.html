   <main>

        <img src="china-blog.png" alt="Ilustração digital de fantasia retratando uma paisagem histórica da China antiga. No centro, um imponente palácio imperial com telhados dourados é cercado por centenas de lanternas chinesas flutuantes iluminadas que sobem em direção ao céu ao anoitecer. Ao fundo, a Grande Muralha da China serpenteia por montanhas rochosas e picos nevados sob um céu dramático com tons de roxo e dourado. Em primeiro plano, uma vila movimentada com canais, barcos tradicionais, terraços de arroz e pessoas atravessando uma ponte de pedra.">
